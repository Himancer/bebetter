# Render deployment for beBetter.
# One web service builds the React frontend, installs the Flask backend, and
# serves both from a single Gunicorn process. A free PostgreSQL database is
# provisioned and DATABASE_URL is wired in automatically; SECRET_KEY is
# auto-generated. Only GROQ_API_KEY needs to be set manually (for the AI chat).

databases:
  - name: bebetter-db
    plan: free

services:
  - type: web
    name: bebetter
    runtime: python
    plan: free
    buildCommand: |
      cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: bebetter-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
    rootDir: .
